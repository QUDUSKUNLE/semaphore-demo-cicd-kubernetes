version: v1.0
name: "\U0001F3AF Simple CI Pipeline"
agent:
  machine:
    type: r1-standard-2
    os_image: ubuntu2404
  containers:
    - name: main
      image: 'registry.semaphoreci.com/node:20'
fail_fast:
  stop:
    when: branch != 'main'
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch = 'main'
blocks:
  - name: "\U0001F433 Docker"
    dependencies: []
    task:
      secrets:
        - name: dockerhub-credentials
      jobs:
        - name: "\U0001F4E6 Build and Push"
          commands:
            - echo "Logging into Docker registry..."
            - echo "Building Docker image..."
            - echo "Pushing image to registry..."
            - echo "Docker image published successfully!"
  - name: "\U0001F680 Deploy"
    dependencies:
      - "\U0001F433 Docker"
    task:
      jobs:
        - name: "\U0001F30D Deploy to Production"
          commands:
            - echo "Preparing deployment..."
            - echo "Updating container version..."
            - echo "Rolling out new containers..."
            - echo "Deployment completed successfully!"
